services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-occ_handover_staging}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data

  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      FRONTEND_PORT: 3000
      BACKEND_PORT: 4000
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME:-occ_handover_staging}?schema=public
      DIRECT_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME:-occ_handover_staging}?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${STAGING_URL}
      BACKEND_URL: http://127.0.0.1:4000
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "Promise.all([fetch('http://127.0.0.1:3000/login'), fetch('http://127.0.0.1:4000/health')]).then(async ([frontend, backend]) => { const payload = await backend.json(); if (!frontend.ok || !backend.ok || payload.status !== 'ok') { process.exit(1) } }).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    ports:
      - '${STAGING_PORT:-3000}:3000'

volumes:
  postgres_staging_data:
