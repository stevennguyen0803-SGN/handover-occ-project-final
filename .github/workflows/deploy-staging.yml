name: Deploy Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Prepare CI environment file
        run: cp .env.example .env

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run test suite
        run: npm test

      - name: Build application
        run: npm run build

      - name: Validate staging compose file
        run: docker compose --env-file infrastructure/staging/.env.staging.example -f infrastructure/staging/docker-compose.staging.yml config

      - name: Boot staging stack in Docker
        run: docker compose --env-file infrastructure/staging/.env.staging.example -f infrastructure/staging/docker-compose.staging.yml up -d --build --wait --wait-timeout 60

      - name: Verify containerized staging URL
        run: curl --fail --silent --show-error http://127.0.0.1:3000/login > /dev/null

      - name: Print staging container logs on failure
        if: failure()
        run: docker compose --env-file infrastructure/staging/.env.staging.example -f infrastructure/staging/docker-compose.staging.yml logs --no-color

      - name: Tear down staging stack
        if: always()
        run: docker compose --env-file infrastructure/staging/.env.staging.example -f infrastructure/staging/docker-compose.staging.yml down -v

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: staging
    if: ${{ secrets.STAGING_SSH_HOST != '' && secrets.STAGING_SSH_USER != '' && secrets.STAGING_SSH_KEY != '' && secrets.STAGING_APP_PATH != '' }}

    steps:
      - name: Deploy on staging host
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT || '22' }}
          script: |
            set -e
            cd "${{ secrets.STAGING_APP_PATH }}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            if [ ! -f infrastructure/staging/.env.staging ]; then
              echo "Missing infrastructure/staging/.env.staging on the staging host."
              exit 1
            fi

            docker compose \
              --env-file infrastructure/staging/.env.staging \
              -f infrastructure/staging/docker-compose.staging.yml \
              up -d --build

            docker compose \
              --env-file infrastructure/staging/.env.staging \
              -f infrastructure/staging/docker-compose.staging.yml \
              ps
